*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--tx);font:16px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;padding-bottom:48px}
header{position:sticky;top:0;z-index:10;background:rgba(14,15,18,.92);backdrop-filter:blur(10px);padding:14px 16px 10px;border-bottom:1px solid var(--line)}
h1{font-size:18px;margin:0 0 2px;letter-spacing:.2px}
.sub{font-size:12px;color:var(--mut)}
.tiles{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:10px}
.tile{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:8px 4px;text-align:center}
.tile .v{font-size:18px;font-weight:700}

.tile .c{font-size:9px;color:var(--mut)}
.wrap{padding:12px 12px 0}
#q{width:100%;padding:11px 14px;border-radius:12px;border:1px solid var(--line);background:var(--card2);color:var(--tx);font-size:16px;margin-bottom:10px}
.b{background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:10px;overflow:hidden}
.bh{display:flex;align-items:center;gap:8px;padding:12px 14px;cursor:pointer}
.bh .nm{font-weight:650;font-size:15px;flex:1;min-width:0}
.bh .ct{font-size:12px;color:var(--mut)}
.key{font-size:13px;text-decoration:none}
.bars{display:flex;gap:3px;padding:0 14px 12px}
.bar{flex:1;height:5px;border-radius:3px;background:#2a2e37;position:relative;overflow:hidden}
.bar i{position:absolute;left:0;top:0;bottom:0;background:var(--ok);border-radius:3px}
.bar.t i{background:var(--acc)} .bar.i i{background:var(--warn)}
.items{display:none;border-top:1px solid var(--line)}
.b.open .items{display:block}
.it{display:flex;align-items:center;gap:8px;padding:9px 14px;border-top:1px solid #20242c}
.it:first-child{border-top:none}
.it .mn{flex:1;min-width:0;font-size:13.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.it .cat{font-size:10px;color:var(--mut)}
.chips{display:flex;gap:4px;flex:none}
.cp{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.y{background:rgba(52,199,89,.16);color:var(--ok)} .n{background:rgba(255,69,58,.13);color:var(--no)}
.legend{display:flex;gap:10px;flex-wrap:wrap;font-size:11px;color:var(--mut);padding:2px 2px 12px}
.chev{color:var(--mut);font-size:12px;transition:transform .15s} .b.open .chev{transform:rotate(90deg)}
.empty{text-align:center;color:var(--mut);padding:30px;font-size:14px}
.flt{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;-webkit-overflow-scrolling:touch}
.chipf{flex:none;padding:6px 12px;border-radius:20px;border:1px solid var(--line);background:var(--card2);color:var(--mut);font-size:12.5px;cursor:pointer}
.chipf.on{background:var(--acc);color:#001;border-color:var(--acc);font-weight:650}
</style></head><body>

const TILES=[["Retail $","retail"],["Trade $","trade"],["Image","image"],["Tear sheet","tear"],["3D model","d3"]];
let q="",filt="all";
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function tiles(rows){
  document.getElementById('tiles').innerHTML=TILES.map(([l,k])=>{
    let c=rows.filter(r=>r[k]).length,p=rows.length?Math.round(100*c/rows.length):0;
    return `<div class=tile><div class=v>${p}%</div><div class=l>${l}</div><div class=c>${c}/${rows.length}</div></div>`;
  }).join('');
}
function passFilt(r){ if(filt=='all')return true; return !r[filt]; }
function render(){
  let rows=DATA.filter(r=>passFilt(r));
  if(q){let s=q.toLowerCase();rows=rows.filter(r=>(r.brand||'').toLowerCase().includes(s)||(r.model||'').toLowerCase().includes(s));}
  tiles(rows);
  let by={};rows.forEach(r=>{(by[r.brand||'(blank)']=by[r.brand||'(blank)']||[]).push(r)});
  let order=Object.keys(by).sort((a,b)=>by[b].length-by[a].length||a.toLowerCase().localeCompare(b.toLowerCase()));
  let h=order.map(b=>{
    let rs=by[b],n=rs.length;
    let pc=k=>Math.round(100*rs.filter(r=>r[k]).length/n);
    let key=PORTALS[b]?`<a class=key href="${PORTALS[b]}" target=_blank rel=noopener onclick="event.stopPropagation()">🔑</a>`:'';
    let bars=[['retail',''],['trade','t'],['image','i'],['tear',''],['d3','']].map(([k,c])=>`<div class="bar ${c}"><i style="width:${pc(k)}%"></i></div>`).join('');
    let items=rs.map(r=>{
      let cp=(k,lab)=>`<div class="cp ${r[k]?'y':'n'}">${lab}</div>`;
      return `<div class=it><div class=mn>${esc(r.model)}<div class=cat>${esc(r.cat||'')}</div></div><div class=chips>${cp('retail','R')}${cp('trade','T')}${cp('image','I')}${cp('tear','📄')}${cp('d3','3D')}</div></div>`;
    }).join('');
    return `<div class=b data-b="${esc(b)}"><div class=bh onclick="this.parentNode.classList.toggle('open')"><span class=chev>▶</span><span class=nm>${esc(b)}</span>${key}<span class=ct>${n}</span></div><div class=bars>${bars}</div><div class=items>${items}</div></div>`;
  }).join('');
  document.getElementById('list').innerHTML=h||'<div class=empty>No matches</div>';
}
document.getElementById('q').addEventListener('input',e=>{q=e.target.value;render()});
